<script type="text/javascript">
  RED.nodes.registerType('golc-auth-simple', {
    category: 'golchomelab',
    color: '#ffd86b',
    defaults: {
      name: { value: '' },
      backendUrl: { value: 'http://localhost:3000', required: true },
      username: { value: '', required: true }
    },
    credentials: {
      password: { type: 'password' },
      accessToken: { type: 'password' },
      userId: { type: 'text' }
    },
    inputs: 1,
    outputs: 1,
    icon: 'golc.png',
    paletteLabel: 'golc-auth-simple',
    label: function () {
      return this.name || 'golc-auth-simple';
    },
    oneditprepare: function () {
      $('#golc-auth-simple-btn-login').on('click', async function (event) {
        event.preventDefault();

        const username = $('#node-input-username').val().trim();
        const password = $('#node-input-password').val().trim();
        const backendUrl = $('#node-input-backendUrl').val().trim();

        if (!username || !password) {
          RED.notify('Укажи username и password', { type: 'error' });
          return;
        }

        if (!backendUrl) {
          RED.notify('Укажи Backend URL', { type: 'error' });
          return;
        }

        try {
          const response = await fetch(`${backendUrl}/api/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
          });

          if (!response.ok) {
            const error = await response.json();
            RED.notify(`Ошибка: ${error.error || response.statusText}`, { type: 'error' });
            return;
          }

          const data = await response.json();

          if (!data.ok || !data.access_token) {
            RED.notify('Backend вернул неверный ответ', { type: 'error' });
            return;
          }

          // Сохраняем токен и user_id
          $('#node-input-accessToken').val(data.access_token).trigger('change');
          $('#node-input-userId').val(data.user_id).trigger('change');
          $('#golc-auth-simple-status').text(`✓ ${data.user_id}`);
          RED.notify('✅ Авторизация успешна', { type: 'success' });
        } catch (error) {
          RED.notify(`Ошибка запроса: ${error.message}`, { type: 'error' });
        }
      });

      // Инициализация статуса
      const userId = $('#node-input-userId').val();
      if (userId) {
        $('#golc-auth-simple-status').text(`✓ ${userId}`);
      }
    }
  });
</script>

<script type="text/x-red" data-help-name="golc-auth-simple">
  <p><strong>Упрощённая аутентификация Яндекс.ID для Алисы</strong></p>
  
  <p>Эта нода аутентифицирует пользователя Яндекса (логин + пароль) и возвращает авторизационный токен для работы с Алисой.</p>

  <h3>Назначение</h3>
  <p>Используется для добавления аккаунта Яндекс в Node-RED для интеграции с Алисой и управлением умными устройствами.</p>

  <h3>Параметры конфигурации</h3>
  <dl class="message-properties">
    <dt>URL бэкенда
      <span class="property-type">string</span>
    </dt>
    <dd>Адрес бэкенд-сервера GOLC (например, http://localhost:3000 или https://api.example.com)</dd>
    <dt>Endpoint аутентификации
      <span class="property-type">string</span>
    </dt>
    <dd>Путь на бэкенде для аутентификации (по умолчанию /alice/auth)</dd>
    <dt>Авто-ответ при таймауте
      <span class="property-type">boolean</span>
    </dt>
    <dd>Если бэкенд не отвечает >3 сек, отправить успешный ответ Алисе (для fallback режима)</dd>
  </dl>

  <h3>Входные сообщения</h3>
  <p><code>msg.payload</code> должно содержать:</p>
  <pre>{
  "login": "user@yandex.ru",        // или yandex.ru ID
  "password": "yourPassword123"      // пароль аккаунта
}</pre>

  <h3>Выходные сообщения</h3>
  <dl class="message-properties">
    <dt>msg.token
      <span class="property-type">string</span>
    </dt>
    <dd>Авторизационный токен для работы с Алисой</dd>
    <dt>msg.user_id
      <span class="property-type">string</span>
    </dt>
    <dd>Уникальный ID пользователя в системе Яндекса</dd>
    <dt>msg.account_email
      <span class="property-type">string</span>
    </dt>
    <dd>Email адрес авторизованного аккаунта</dd>
    <dt>msg.statusCode
      <span class="property-type">number</span>
    </dt>
    <dd>HTTP статус: 200 = успех, 401 = неверный пароль, другое = ошибка</dd>
    <dt>msg.authResult
      <span class="property-type">object</span>
    </dt>
    <dd>Полный JSON ответ от бэкенда</dd>
  </dl>

  <h3>Коды ошибок</h3>
  <table style="width: 100%; border-collapse: collapse;">
    <tr>
      <th style="text-align: left; border-bottom: 1px solid #ccc; padding: 8px;">Статус</th>
      <th style="text-align: left; border-bottom: 1px solid #ccc; padding: 8px;">Значение</th>
    </tr>
    <tr>
      <td style="border-bottom: 1px solid #ddd; padding: 8px;">200</td>
      <td style="border-bottom: 1px solid #ddd; padding: 8px;">✓ Успешная аутентификация</td>
    </tr>
    <tr>
      <td style="border-bottom: 1px solid #ddd; padding: 8px;">401</td>
      <td style="border-bottom: 1px solid #ddd; padding: 8px;">✗ Неверный логин или пароль</td>
    </tr>
    <tr>
      <td style="border-bottom: 1px solid #ddd; padding: 8px;">500+</td>
      <td style="border-bottom: 1px solid #ddd; padding: 8px;">✗ Ошибка на сервере</td>
    </tr>
  </table>

  <h3>Примеры использования</h3>

  <h4>Пример 1: Простая аутентификация</h4>
  <pre>
// Inject node с:
{
  "login": "user@yandex.ru",
  "password": "secretPassword"
}

// Выход из golc-auth-simple:
{
  "login": "user@yandex.ru",
  "password": "secretPassword",
  "token": "eJydUsFuwjAM/BXLZ0gscSaEhDTtMkmb1Al4qHMqFi4Ey...",
  "user_id": "123456789",
  "account_email": "user@yandex.ru",
  "statusCode": 200,
  "authResult": {...}
}
  </pre>

  <h4>Пример 2: Сохранение токена для последующей работы</h4>
  <p>После успешной аутентификации можно сохранить <code>msg.token</code> в переменную контекста:</p>
  <pre>
// В Function node:
context.global.aliceToken = msg.token;
context.global.aliceUserId = msg.user_id;

// Используйте позже для запросов к API Алисы
  </pre>

  <h3>Интеграция с бэкенд-ом</h3>
  <p>Бэкенд должен предоставить endpoint <code>POST /alice/auth</code> который:</p>
  <ul>
    <li>Принимает JSON: <code>{"login": "...", "password": "..."}</code></li>
    <li>Возвращает JSON: <code>{"access_token": "...", "user_id": "...", "account_email": "..."}</code></li>
  </ul>

  <h3>Документация</h3>
  <ul>
    <li><a href="https://yandex.ru/dev/id/">Яндекс.ID — документация</a></li>
    <li><a href="https://github.com/detdomovski-prog/GOLC-HOME-lab-alise">GOLC HOME на GitHub</a></li>
  </ul>
</script>
