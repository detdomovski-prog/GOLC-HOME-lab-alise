<script type="text/javascript">
  RED.nodes.registerType('golchomelab-auth', {
    category: 'golchomelab',
    color: '#ffd86b',
    defaults: {
      name: { value: '' },
      backendUrl: { value: 'http://localhost:3000', required: true },
      passwordEndpoint: { value: '/alice/auth' },
      includeAuthHeader: { value: true },
      alwaysSuccess: { value: false }
    },
    credentials: {
      login: { type: 'text' },
      password: { type: 'password' }
    },
    inputs: 1,
    outputs: 1,
    icon: 'golc.png',
    paletteLabel: 'golc-auth',
    label: function () {
      return this.name || 'golc-auth';
    }
  });
</script>

<script type="text/html" data-template-name="golchomelab-auth">
  <div class="form-row">
    <label for="node-input-name"><i class="fa fa-tag"></i> Название</label>
    <input type="text" id="node-input-name" placeholder="golc-auth" />
  </div>

  <div class="form-tips" style="margin-bottom: 12px; border-left: 4px solid #ff9800;">
    <b>Один простой вход:</b> пользователь вводит логин и пароль прямо в ноде. Других режимов нет — только простой backend login.
  </div>

  <div class="form-row">
    <label for="node-input-backendUrl">URL backend</label>
    <input type="text" id="node-input-backendUrl" placeholder="http://localhost:3000" />
  </div>

  <div class="form-row">
    <label for="node-input-login">Логин</label>
    <input type="text" id="node-input-login" placeholder="user@yandex.ru" />
  </div>

  <div class="form-row">
    <label for="node-input-password">Пароль</label>
    <input type="password" id="node-input-password" placeholder="пароль аккаунта" />
  </div>

  <div class="form-row">
    <label for="node-input-passwordEndpoint">Endpoint входа</label>
    <input type="text" id="node-input-passwordEndpoint" placeholder="/alice/auth" />
  </div>

  <div class="form-row">
    <label for="node-input-includeAuthHeader">Bearer header</label>
    <input type="checkbox" id="node-input-includeAuthHeader" style="width:auto;" />
    <span style="margin-left: 8px;">добавлять <code>Authorization: Bearer ...</code></span>
  </div>

  <div class="form-row">
    <label for="node-input-alwaysSuccess">Fallback</label>
    <input type="checkbox" id="node-input-alwaysSuccess" style="width:auto;" />
    <span style="margin-left: 8px;">успешный ответ при таймауте backend</span>
  </div>

  <div class="form-tips" style="margin-top: 10px;">
    <b>Как пользоваться:</b><br/>
    1) Введите логин и пароль в настройках ноды.<br/>
    2) Отправьте в ноду любой <code>msg</code>.<br/>
    3) На выходе получите <code>msg.access_token</code> и (опционально) <code>Authorization</code> header.
  </div>
</script>

<script type="text/html" data-help-name="golchomelab-auth">
  <p><b>Упрощённая авторизация GOLC / Алисы</b></p>
  <p>Один режим входа: <b>логин + пароль</b> через backend endpoint <code>/alice/auth</code>.</p>

  <h3>Выходные поля</h3>
  <ul>
    <li><code>msg.access_token</code> — токен доступа.</li>
    <li><code>msg.token</code> — дубликат токена для совместимости.</li>
    <li><code>msg.account_email</code> — email аккаунта.</li>
    <li><code>msg.headers.Authorization</code> — Bearer header, если включено.</li>
  </ul>
</script>
